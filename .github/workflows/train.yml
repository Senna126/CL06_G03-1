name: Automated Model Training and Monitoring

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "src/**"
      - "requirements.txt"
      - "dvc.yaml"
      - ".github/workflows/train.yml"

  workflow_dispatch:

jobs:
  train-and-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output folders
        run: |
          mkdir -p artifacts/data
          mkdir -p artifacts/preprocessing
          mkdir -p artifacts/models
          mkdir -p artifacts/metrics
          mkdir -p artifacts/plots
          mkdir -p reports

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train model
        run: python src/model.py

      - name: Evaluate model
        run: python src/evaluate.py

      - name: Run monitoring
        run: python src/monitor.py

      - name: Upload generated artifacts and reports
        uses: actions/upload-artifact@v4
        with:
          name: obesity-model-pipeline-results
          path: |
            artifacts/
            reports/